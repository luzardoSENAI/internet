<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso - Técnico em Informática para Internet</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        #conteudo-privado {
            display: none;
        }

        /* TELA DE LOGIN */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #004a8d, #f37021);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 300px;
        }

        .login-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .login-box button {
            background: #004a8d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        /* DASHBOARD */
        .header {
            text-align: center;
            background: linear-gradient(90deg, #004a8d, #f37021);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .previsao-box {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            color: #856404;
        }

        .geral-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .progress-geral-bar {
            height: 30px;
            background-color: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
        }

        .progress-geral-fill {
            height: 100%;
            background-color: #004a8d;
            text-align: center;
            line-height: 30px;
            color: white;
            font-weight: bold;
            width: 0%;
            transition: width 0.5s;
        }

        /* GRID DE DISCIPLINAS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #ccc;
            position: relative;
        }

        .card.concluido {
            border-left-color: #28a745;
        }

        .card.andamento {
            border-left-color: #f37021;
        }

        .card.pendente {
            border-left-color: #6c757d;
        }

        .badge {
            float: right;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            color: white;
        }

        .badge.concluido {
            background-color: #28a745;
        }

        .badge.andamento {
            background-color: #f37021;
        }

        .badge.pendente {
            background-color: #6c757d;
        }

        .modulo-tag {
            display: inline-block;
            background-color: #eef3f9;
            color: #004a8d;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .info span {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .progress-bar {
            height: 12px;
            background-color: #e9ecef;
            border-radius: 6px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #f37021;
            width: 0%;
        }

        .card.concluido .progress-fill {
            background-color: #28a745;
        }

        .status-text {
            text-align: right;
            font-weight: bold;
            font-size: 12px;
            margin-top: 5px;
        }

        footer {
            text-align: center;
            background: linear-gradient(90deg, #004a8d, #f37021);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="Logotipo_SENAI.png" alt="SENAI" width="150" style="margin-bottom:15px">
            <h3>Acesso Restrito</h3>
            <input type="text" id="usuario" placeholder="Usuário" value="Internet">
            <input type="password" id="senha" placeholder="Senha" value="senai">
            <button onclick="verificarLogin()">Entrar</button>
            <p id="erro" style="color:red; font-size:12px; display:none; margin-top:10px">Usuário ou senha incorretos!
            </p>
        </div>
    </div>

    <div id="conteudo-privado">
        <div class="header">
            <h1>🌐 Técnico em Informática para Internet</h1>
            <p>Instrutor: Romano</p>
        </div>

        <div class="previsao-box" id="previsaoBox">
            Calculando previsão de conclusão...
        </div>

        <div class="geral-container">
            <h2>Progresso Geral do Curso (Carga Horária Total: 1200h)</h2>
            <div class="progress-geral-bar">
                <div id="progressoGeral" class="progress-geral-fill">0%</div>
            </div>
        </div>

        <div id="disciplinasGrid" class="grid"></div>

        <footer>
            <p>Portal de Acompanhamento Acadêmico</p>
        </footer>
    </div>

    <script>
        const horasPorDia = 4;
        const cargaHorariaTotalCurso = 1200;

        const disciplinas = [
            // MODULO BÁSICO (112h) - Concluído
            { modulo: "Básico", nome: "📈 Introdução à Qualidade e Produtividade", carga: 16, concluidaHistorico: true },
            { modulo: "Básico", nome: "⛑️ Saúde e Segurança no Trabalho", carga: 12, concluidaHistorico: true },
            { modulo: "Básico", nome: "🏭 Introdução à Indústria 4.0", carga: 24, concluidaHistorico: true },
            { modulo: "Básico", nome: "📋 Introdução ao Desenvolvimento de Projetos", carga: 12, concluidaHistorico: true },
            { modulo: "Básico", nome: "🖥️ Introdução à Tecnologia da Informação e Comunicação", carga: 40, concluidaHistorico: true },
            { modulo: "Básico", nome: "♻️ Sustentabilidade nos processos industriais", carga: 8, concluidaHistorico: true },

            // MODULO INTRODUTÓRIO (176h) - Concluído
            { modulo: "Introdutório", nome: "📋 Metodologias de Desenvolvimento de Projetos", carga: 12, concluidaHistorico: true },
            { modulo: "Introdutório", nome: "🏗️ Arquitetura de Hardware e Software", carga: 24, concluidaHistorico: true },
            { modulo: "Introdutório", nome: "🌿 Versionamento e Colaboração", carga: 20, concluidaHistorico: true },
            { modulo: "Introdutório", nome: "🧠 Lógica de Programação", carga: 80, concluidaHistorico: true },
            { modulo: "Introdutório", nome: "🎨 Fundamentos de UI / UX", carga: 40, concluidaHistorico: true },

            // MODULO ESPECÍFICO I (316h) - Concluído
            { modulo: "Específico I", nome: "💻 Codificação para Front-End", carga: 100, concluidaHistorico: true },
            { modulo: "Específico I", nome: "🔌 Interação com APIs", carga: 40, concluidaHistorico: true },
            { modulo: "Específico I", nome: "🧪 Testes de Front-End", carga: 40, concluidaHistorico: true },
            { modulo: "Específico I", nome: "🚀 Projeto de Front-End", carga: 136, concluidaHistorico: true },

            // MODULO ESPECÍFICO II (396h)
            { modulo: "Específico II", nome: "⚙️ Codificação para Back-End", carga: 100, concluidaHistorico: true },
            { modulo: "Específico II", nome: "🌐 Desenvolvimento de APIs", carga: 60, concluidaHistorico: true },
            { modulo: "Específico II", nome: "🗄️ Banco de Dados", carga: 40, concluidaHistorico: true },
            { modulo: "Específico II", nome: "🐛 Testes de Back-End", carga: 60, concluidaHistorico: true },
            // UC ATUALMENTE EM ANDAMENTO - Iniciada em 25/05/2026
            { modulo: "Específico II", nome: "🛠️ Projeto de Back-End", carga: 136, dataFixaInicio: new Date(2026, 4, 25) }, // 25/05/2026 (Mês 4 no JS)

            // PROJETO FINAL (200h) - Futuras
            { modulo: "Projeto Final", nome: "🏗️ Desenvolvimento de Projeto", carga: 100 },
            { modulo: "Projeto Final", nome: "💡 Projeto de Pesquisa e Inovação", carga: 100 }
        ];

        function verificarLogin() {
            const user = document.getElementById('usuario').value;
            const pass = document.getElementById('senha').value;
            if (user === "Internet" && pass === "senai") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                render();
            } else {
                document.getElementById('erro').style.display = 'block';
            }
        }

        function ehDiaLetivo(data) {
            const d = data.getDay();
            return d !== 0 && d !== 6;
        }

        function adicionarDiasUteis(data, dias) {
            let dt = new Date(data), c = 0;
            while (c < dias) {
                dt.setDate(dt.getDate() + 1);
                if (ehDiaLetivo(dt)) c++;
            }
            return dt;
        }

        function render() {
            const hoje = new Date(); // Captura dinamicamente a data de execução atual
            let cursorCalendario = new Date(2025, 3, 29);

            const grid = document.getElementById("disciplinasGrid");
            grid.innerHTML = "";
            let totalHorasConcluidasCurso = 0;
            let dataFinalRealCurso = null;

            disciplinas.forEach((disc, i) => {
                if (disc.dataFixaInicio) {
                    cursorCalendario = new Date(disc.dataFixaInicio);
                }

                const diasNecessarios = Math.ceil(disc.carga / horasPorDia);
                const dataInicioUC = new Date(cursorCalendario);
                const dataFimUC = adicionarDiasUteis(cursorCalendario, diasNecessarios - 1);

                dataFinalRealCurso = dataFimUC;

                cursorCalendario = new Date(dataFimUC);
                cursorCalendario.setDate(cursorCalendario.getDate() + 1);

                let progressoUC = 0;
                let statusUC = "pendente";
                let statusTextoUC = "Não Iniciado";

                if (disc.concluidoHistorico === true) {
                    progressoUC = 100;
                    statusUC = "concluido";
                    statusTextoUC = "Concluído";
                    totalHorasConcluidasCurso += disc.carga;
                } else {
                    if (hoje < dataInicioUC) {
                        progressoUC = 0;
                        statusUC = "pendente";
                        statusTextoUC = "Não Iniciado";
                    } else if (hoje > dataFimUC) {
                        progressoUC = 100;
                        statusUC = "concluido";
                        statusTextoUC = "Concluído";
                        totalHorasConcluidasCurso += disc.carga;
                    } else {
                        // UNIDADE ATUAL EM CURSO (Projeto de Back-End)
                        let diasUteisPassados = 0;
                        let dataVarredura = new Date(dataInicioUC);

                        while (dataVarredura <= hoje) {
                            if (ehDiaLetivo(dataVarredura)) diasUteisPassados++;
                            dataVarredura.setDate(dataVarredura.getDate() + 1);
                        }

                        let horasGanhasUC = diasUteisPassados * horasPorDia;
                        progressoUC = Math.min(99, Math.floor((horasGanhasUC / disc.carga) * 100));
                        statusUC = "andamento";
                        statusTextoUC = "Em Andamento";

                        totalHorasConcluidasCurso += horasGanhasUC;
                    }
                }

                const card = document.createElement("div");
                card.className = `card ${statusUC}`;
                card.innerHTML = `
            <span class="badge ${statusUC}">${statusTextoUC}</span>
            <span class="modulo-tag">Módulo ${disc.modulo}</span>
            <h3>${i + 1}. ${disc.nome}</h3>
            <div class="info">
                <span>🕒 Carga: ${disc.carga}h</span>
                <span>📅 ${dataInicioUC.toLocaleDateString('pt-BR')} à ${dataFimUC.toLocaleDateString('pt-BR')}</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${progressoUC}%"></div></div>
            <div class="status-text">${progressoUC}%</div>
        `;
                grid.appendChild(card);
            });

            // Atualização matemática da Barra Global (1200h)
            const porcentagemGlobal = Math.floor((totalHorasConcluidasCurso / cargaHorariaTotalCurso) * 100);
            const barraGeralElemento = document.getElementById("progressoGeral");
            barraGeralElemento.style.width = porcentagemGlobal + "%";
            barraGeralElemento.innerText = porcentagemGlobal + "% (" + Math.floor(totalHorasConcluidasCurso) + "h / 1200h)";

            // Atualização dinâmica do Card Amarelo de Previsão de Encerramento do Curso Completo
            document.getElementById("previsaoBox").innerHTML = `
        🏁 Previsão Estimada de Conclusão do Curso: <strong>${dataFinalRealCurso.toLocaleDateString('pt-BR')}</strong><br>
        <span style="font-size:12px; font-weight:normal">Acompanhamento automatizado em tempo real. Cada dia letivo assistido adiciona +4h de progresso no sistema.</span>
    `;
        }
    </script>
</body>

</html>
